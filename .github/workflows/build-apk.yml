name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Generate icon & splash
        run: npx @capacitor/assets generate --android --assetPath resources || echo "lewati - pakai ikon default"

      - name: Sync web assets
        run: npx cap sync android

      - name: Build APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Get version
        id: version
        run: echo "version=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "AlQuran-${{ steps.version.outputs.version }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlQuran-APK
          path: "AlQuran-*.apk"

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Al-Qur'an ${{ steps.version.outputs.version }} - Build ${{ github.run_number }}"
          body: "APK otomatis dari GitHub Actions. Unduh file .apk di bawah, kirim ke HP, lalu instal."
          files: "AlQuran-*.apk"
